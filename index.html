<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mecanizados UPC — Rediseño Digital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="v2/v2.css?v=10" />

<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body { background: #eef1f5; font-family: 'Inter', sans-serif; }
  * { box-sizing: border-box; }
  body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
  img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="shared/data.js?v=10"></script>
<script type="text/babel" src="shared/placeholder.jsx?v=10"></script>

<script type="text/babel" src="v2/v2-home.jsx?v=10"></script>
<script type="text/babel" src="v2/v2-pages.jsx?v=10"></script>
<script type="text/babel" src="v2/v2-app.jsx?v=10"></script>

<script type="text/babel" data-presets="env,react">
ReactDOM.createRoot(document.getElementById('root')).render(<window.V2App />);
</script>

<script>
(function() {
  // Clic derecho desactivado
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // Atajos de teclado bloqueados
  document.addEventListener('keydown', function(e) {
    var k = e.key || e.keyCode;
    // F12
    if (k === 'F12' || k === 123) { e.preventDefault(); return; }
    // Ctrl/Cmd + combinaciones
    if (e.ctrlKey || e.metaKey) {
      var blocked = ['u','U','s','S','a','A','p','P','j','J','i','I','c','C'];
      if (blocked.indexOf(e.key) !== -1) {
        // Ctrl+A solo bloqueado fuera de inputs/textarea
        if ((e.key === 'a' || e.key === 'A') && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA')) return;
        e.preventDefault();
      }
      // Ctrl+Shift+I / Ctrl+Shift+J / Ctrl+Shift+C
      if (e.shiftKey && ['i','I','j','J','c','C'].indexOf(e.key) !== -1) { e.preventDefault(); }
    }
  });

  // Drag de imágenes bloqueado
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });
})();
</script>
</body>
</html>
